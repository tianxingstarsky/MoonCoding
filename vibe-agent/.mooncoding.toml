# MoonCoding agent configuration
# This file is optional — all values can come from environment variables instead.

[provider]
# OpenAI-compatible endpoint
base_url = "https://api.deepseek.com"       # MOONCODING_BASE_URL
model = "deepseek-v4-flash"                  # MOONCODING_MODEL
# api_key = "${DEEPSEEK_API_KEY}"            # MOONCODING_API_KEY (or DEEPSEEK_API_KEY / OPENAI_API_KEY)
max_tokens = 4096
temperature = 0.1

[agent]
max_steps = 200
prune_after = 12
prune_keep = 6

